<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    background: {{bg_color}};
    font-family: 'Inter', sans-serif;
    display: flex; flex-direction: column;
    overflow: hidden; position: relative;
  }
  .image-area {
    height: 520px; position: relative;
    background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 50%, #ffcc80 100%);
    display: flex; justify-content: center; align-items: center;
    overflow: hidden;
  }
  .image-area::before {
    content: ''; position: absolute; inset: 0;
    background: repeating-linear-gradient(45deg, transparent, transparent 30px, rgba(230,81,0,0.03) 30px, rgba(230,81,0,0.03) 32px);
  }
  .image-area::after {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 120px;
    background: linear-gradient(transparent, {{bg_color}});
  }
  .plate-icon {
    position: relative; z-index: 1; text-align: center;
  }
  .plate-circle {
    width: 200px; height: 200px; border-radius: 50%;
    border: 3px solid rgba(230,81,0,0.15);
    display: flex; justify-content: center; align-items: center;
    margin: 0 auto 16px;
    background: rgba(255,255,255,0.5);
  }
  .plate-emoji { font-size: 80px; }
  .plate-label {
    font-family: 'Poppins', sans-serif; font-weight: 600;
    font-size: 18px; color: rgba(230,81,0,0.5); letter-spacing: 4px; text-transform: uppercase;
  }
  .product-image {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; z-index: 1;
  }
  .corner-br { position: absolute; bottom: 28px; right: 28px; width: 48px; height: 48px; border-bottom: 2px solid rgba(230,81,0,0.08); border-right: 2px solid rgba(230,81,0,0.08); z-index: 2; }
  .content {
    flex: 1; display: flex; flex-direction: column;
    justify-content: center; padding: 32px 64px 56px; position: relative; z-index: 1;
  }
  .headline {
    font-family: 'Poppins', sans-serif; font-weight: 800; font-size: 52px;
    color: #2d1600; line-height: 1.1; margin-bottom: 16px;
  }
  .description { font-size: 24px; font-weight: 400; color: #5d4037; line-height: 1.5; margin-bottom: 32px; }
  .cta {
    display: inline-block; width: fit-content; background: {{accent_color}}; color: #fff;
    font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 24px;
    padding: 20px 56px; border-radius: 50px;
    box-shadow: 0 6px 24px {{accent_color}}33;
  }
</style>
</head>
<body>
  <div class="image-area">
    <img class="product-image" src="{{product_image}}" style="display:{{image_display}}">
    <div class="plate-icon" style="display:{{placeholder_display}}">
      <div class="plate-circle"><span class="plate-emoji">🍽️</span></div>
      <div class="plate-label">Lezzetli Seçenekler</div>
    </div>
  </div>
  <div class="content">
    <div class="headline">{{headline}}</div>
    <div class="description">{{description}}</div>
    <div class="cta">{{cta}}</div>
  </div>
  <div class="corner-br"></div>
</body>
</html>
