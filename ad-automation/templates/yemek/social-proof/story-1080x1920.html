<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1920px;
    background: {{bg_color}};
    font-family: 'Inter', sans-serif;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    text-align: center; padding: 80px;
    overflow: hidden; position: relative;
  }
  body::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(circle at 20% 80%, rgba(216,67,21,0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255,109,0,0.03) 0%, transparent 50%);
  }
  .corner-tl { position: absolute; top: 48px; left: 48px; width: 56px; height: 56px; border-top: 2px solid {{accent_color}}15; border-left: 2px solid {{accent_color}}15; z-index: 2; }
  .food-image {
    width: 280px; height: 280px; border-radius: 50%; overflow: hidden;
    border: 4px solid {{accent_color}}20; margin-bottom: 36px;
    box-shadow: 0 8px 32px rgba(216,67,21,0.1);
    position: relative; z-index: 1;
  }
  .food-image img { width: 100%; height: 100%; object-fit: cover; }
  .badge {
    background: #fff; border: 2px solid {{accent_color}};
    border-radius: 20px; padding: 28px 48px; margin-bottom: 48px;
    box-shadow: 0 4px 20px rgba(216,67,21,0.08);
    position: relative; z-index: 1;
  }
  .stars { font-size: 44px; margin-bottom: 12px; }
  .badge-text { font-weight: 600; font-size: 22px; color: {{accent_color}}; }
  .headline {
    font-family: 'Poppins', sans-serif; font-weight: 900; font-size: 72px;
    color: #2d1600; line-height: 1.1; margin-bottom: 32px;
    position: relative; z-index: 1;
  }
  .description {
    font-size: 32px; font-weight: 400; color: #5d4037; line-height: 1.5;
    margin-bottom: 56px; max-width: 900px; position: relative; z-index: 1;
  }
  .cta {
    display: inline-block; background: {{accent_color}}; color: #fff;
    font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 30px;
    padding: 26px 72px; border-radius: 60px;
    box-shadow: 0 6px 24px {{accent_color}}33; position: relative; z-index: 1;
  }
  .trust-row {
    display: flex; gap: 20px; margin-top: 48px; position: relative; z-index: 1;
  }
  .trust-item {
    background: #fff; border: 1px solid {{accent_color}}25;
    border-radius: 50px; padding: 14px 28px;
    font-size: 18px; font-weight: 500; color: #5d4037;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }
</style>
</head>
<body>
  <div class="corner-tl"></div>
  <div class="food-image" style="display:{{image_display}}"><img src="{{product_image}}"></div>
  <div class="badge">
    <div class="stars">⭐⭐⭐⭐⭐</div>
    <div class="badge-text">1000+ Mutlu Müşteri</div>
  </div>
  <div class="headline">{{headline}}</div>
  <div class="description">{{description}}</div>
  <div class="cta">{{cta}}</div>
  <div class="trust-row">
    <div class="trust-item">✓ Hızlı Teslimat</div>
    <div class="trust-item">✓ Taze Malzeme</div>
    <div class="trust-item">✓ Hijyen Garantisi</div>
  </div>
</body>
</html>
