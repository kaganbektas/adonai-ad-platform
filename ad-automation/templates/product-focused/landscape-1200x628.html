<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 628px;
    background: {{bg_color}};
    font-family: 'Inter', sans-serif;
    display: flex; overflow: hidden; position: relative;
  }
  .image-area {
    width: 460px; height: 628px; position: relative;
    background: linear-gradient(135deg, #e0e7ee 0%, #c9d6e3 40%, #b8c8d8 100%);
    flex-shrink: 0; overflow: hidden;
  }
  .image-area::before {
    content: ''; position: absolute; inset: 0;
    background:
      linear-gradient(60deg, transparent 40%, rgba(255,255,255,0.08) 40%, rgba(255,255,255,0.08) 42%, transparent 42%),
      linear-gradient(-60deg, transparent 40%, rgba(255,255,255,0.06) 40%, rgba(255,255,255,0.06) 42%, transparent 42%);
  }
  .image-area::after {
    content: ''; position: absolute; top: 0; right: 0; bottom: 0; width: 80px;
    background: linear-gradient(90deg, transparent, {{bg_color}});
  }
  .shopping-icon {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    display: flex; flex-direction: column; align-items: center;
  }
  .bag { width: 100px; height: 120px; border: 3px solid rgba(255,255,255,0.25); border-radius: 0 0 16px 16px; position: relative; }
  .bag::before {
    content: ''; position: absolute; top: -32px; left: 20px;
    width: 56px; height: 32px; border: 3px solid rgba(255,255,255,0.25);
    border-radius: 32px 32px 0 0; border-bottom: none;
  }
  .bag-label { color: rgba(255,255,255,0.3); font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 14px; margin-top: 12px; letter-spacing: 2px; }
  .content {
    padding: 44px 48px;
    display: flex; flex-direction: column;
    justify-content: center; flex: 1;
  }
  .headline {
    font-family: 'Poppins', sans-serif; font-weight: 800; font-size: 44px;
    color: #1a1a2e; line-height: 1.15; margin-bottom: 16px;
  }
  .description { font-size: 22px; font-weight: 400; color: #4a4a68; line-height: 1.5; margin-bottom: 28px; }
  .cta {
    display: inline-block; width: fit-content;
    background: {{accent_color}}; color: #fff;
    font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 20px;
    padding: 16px 44px; border-radius: 12px;
    box-shadow: 0 4px 16px rgba(0,184,148,0.2);
  }
  .corner-br { position: absolute; bottom: 20px; right: 20px; width: 36px; height: 36px; border-bottom: 2px solid rgba(0,0,0,0.05); border-right: 2px solid rgba(0,0,0,0.05); }
</style>
</head>
<body>
  <div class="image-area">
    <div class="shopping-icon">
      <div class="bag"></div>
      <div class="bag-label">ÜRÜN</div>
    </div>
  </div>
  <div class="content">
    <div class="headline">{{headline}}</div>
    <div class="description">{{description}}</div>
    <div class="cta">{{cta}}</div>
  </div>
  <div class="corner-br"></div>
</body>
</html>
