<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800;900&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    background: linear-gradient(135deg, #1a0533 0%, #2d1b69 30%, #0d47a1 70%, #00838f 100%);
    font-family: 'Inter', sans-serif;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    text-align: center; padding: 80px;
    overflow: hidden; position: relative;
  }
  body::before {
    content: ''; position: absolute; top: -200px; right: -200px;
    width: 500px; height: 500px; border-radius: 50%;
    background: radial-gradient(circle, rgba(0,229,255,0.08) 0%, transparent 70%);
  }
  body::after {
    content: ''; position: absolute; bottom: -150px; left: -150px;
    width: 400px; height: 400px; border-radius: 50%;
    background: radial-gradient(circle, rgba(156,39,176,0.08) 0%, transparent 70%);
  }
  .glow-border {
    position: absolute; inset: 16px; border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.06);
    box-shadow: inset 0 0 60px rgba(0,229,255,0.03);
  }
  .corner-tl, .corner-br { position: absolute; width: 44px; height: 44px; z-index: 2; }
  .corner-tl { top: 32px; left: 32px; border-top: 2px solid rgba(255,255,255,0.08); border-left: 2px solid rgba(255,255,255,0.08); }
  .corner-br { bottom: 32px; right: 32px; border-bottom: 2px solid rgba(255,255,255,0.08); border-right: 2px solid rgba(255,255,255,0.08); }
  .float-dot-1 { position: absolute; top: 180px; left: 80px; width: 8px; height: 8px; border-radius: 50%; background: rgba(0,229,255,0.15); }
  .float-dot-2 { position: absolute; bottom: 220px; right: 120px; width: 6px; height: 6px; border-radius: 50%; background: rgba(156,39,176,0.15); }
  .float-dot-3 { position: absolute; top: 300px; right: 80px; width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.06); }
  .headline {
    font-family: 'Poppins', sans-serif; font-weight: 900; font-size: 68px;
    color: #ffffff; line-height: 1.1; margin-bottom: 28px;
    text-shadow: 0 4px 24px rgba(0,0,0,0.3); position: relative; z-index: 1;
  }
  .description {
    font-size: 28px; font-weight: 400; color: rgba(255,255,255,0.85); line-height: 1.5;
    margin-bottom: 48px; max-width: 800px; position: relative; z-index: 1;
  }
  .cta {
    display: inline-block; background: {{accent_color}}; color: #1a0533;
    font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 26px;
    padding: 22px 64px; border-radius: 60px;
    box-shadow: 0 0 40px rgba(0,229,255,0.15), 0 8px 32px rgba(0,0,0,0.2);
    position: relative; z-index: 1;
  }
  .price-tag {
    position: absolute; top: 48px; right: 48px;
    background: {{accent_color}}; color: #1a0533;
    font-family: 'Poppins', sans-serif; font-weight: 800;
    font-size: 24px; padding: 16px 28px; border-radius: 12px;
    transform: rotate(3deg); z-index: 3;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  }
</style>
</head>
<body>
  <div class="glow-border"></div>
  <div class="corner-tl"></div><div class="corner-br"></div>
  <div class="float-dot-1"></div><div class="float-dot-2"></div><div class="float-dot-3"></div>
  <div class="price-tag">FIRSATI YAKALA</div>
  <div class="headline">{{headline}}</div>
  <div class="description">{{description}}</div>
  <div class="cta">{{cta}}</div>
</body>
</html>
