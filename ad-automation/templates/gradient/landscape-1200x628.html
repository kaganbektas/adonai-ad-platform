<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800;900&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 628px;
    background: linear-gradient(135deg, #1a0533 0%, #2d1b69 30%, #0d47a1 70%, #00838f 100%);
    font-family: 'Inter', sans-serif;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    text-align: center; padding: 48px 80px;
    overflow: hidden; position: relative;
  }
  body::before {
    content: ''; position: absolute; top: -100px; right: -100px;
    width: 300px; height: 300px; border-radius: 50%;
    background: radial-gradient(circle, rgba(0,229,255,0.08) 0%, transparent 70%);
  }
  .glow-border {
    position: absolute; inset: 12px; border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.05);
  }
  .corner-tl, .corner-br { position: absolute; width: 36px; height: 36px; z-index: 2; }
  .corner-tl { top: 24px; left: 24px; border-top: 2px solid rgba(255,255,255,0.08); border-left: 2px solid rgba(255,255,255,0.08); }
  .corner-br { bottom: 24px; right: 24px; border-bottom: 2px solid rgba(255,255,255,0.08); border-right: 2px solid rgba(255,255,255,0.08); }
  .headline {
    font-family: 'Poppins', sans-serif; font-weight: 900; font-size: 54px;
    color: #ffffff; line-height: 1.1; margin-bottom: 18px;
    text-shadow: 0 4px 24px rgba(0,0,0,0.3); position: relative; z-index: 1;
  }
  .description {
    font-size: 24px; font-weight: 400; color: rgba(255,255,255,0.85); line-height: 1.5;
    margin-bottom: 32px; max-width: 900px; position: relative; z-index: 1;
  }
  .cta {
    display: inline-block; background: {{accent_color}}; color: #1a0533;
    font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 22px;
    padding: 18px 52px; border-radius: 60px;
    box-shadow: 0 0 30px rgba(0,229,255,0.15); position: relative; z-index: 1;
  }
  .price-tag {
    position: absolute; top: 28px; right: 36px;
    background: {{accent_color}}; color: #1a0533;
    font-family: 'Poppins', sans-serif; font-weight: 800;
    font-size: 16px; padding: 10px 18px; border-radius: 8px;
    transform: rotate(3deg); z-index: 3;
  }
</style>
</head>
<body>
  <div class="glow-border"></div>
  <div class="corner-tl"></div><div class="corner-br"></div>
  <div class="price-tag">FIRSATI YAKALA</div>
  <div class="headline">{{headline}}</div>
  <div class="description">{{description}}</div>
  <div class="cta">{{cta}}</div>
</body>
</html>
