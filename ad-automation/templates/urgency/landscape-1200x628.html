<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 628px;
    background: linear-gradient(135deg, #b71c1c 0%, #d84315 50%, #e65100 100%);
    font-family: 'Inter', sans-serif;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    text-align: center; padding: 40px 80px;
    overflow: hidden; position: relative;
  }
  body::before {
    content: ''; position: absolute; inset: -10px;
    background: repeating-linear-gradient(45deg, transparent, transparent 50px, rgba(0,0,0,0.025) 50px, rgba(0,0,0,0.025) 52px);
  }
  .urgency-banner {
    position: absolute; top: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.35); padding: 14px;
    display: flex; justify-content: center; align-items: center; gap: 10px;
    border-bottom: 2px solid #ffeb3b44;
  }
  .urgency-banner span { font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 22px; color: #ffeb3b; letter-spacing: 2px; }
  .timer-icon { font-size: 28px; }
  .headline {
    font-family: 'Poppins', sans-serif; font-weight: 900; font-size: 52px;
    color: #ffffff; line-height: 1.1; margin-bottom: 16px;
    text-shadow: 0 4px 20px rgba(0,0,0,0.3); position: relative; z-index: 1;
  }
  .description {
    font-size: 22px; font-weight: 400; color: rgba(255,255,255,0.9); line-height: 1.5;
    margin-bottom: 28px; max-width: 900px; position: relative; z-index: 1;
  }
  .cta {
    display: inline-block; background: #ffeb3b; color: #b71c1c;
    font-family: 'Poppins', sans-serif; font-weight: 800; font-size: 22px;
    padding: 18px 56px; border-radius: 60px;
    box-shadow: 0 0 30px rgba(255,235,59,0.25), 0 8px 32px rgba(0,0,0,0.25);
    text-transform: uppercase; position: relative; z-index: 1;
  }
  .corner-bl { position: absolute; bottom: 20px; left: 20px; width: 36px; height: 36px; border-bottom: 2px solid rgba(255,235,59,0.12); border-left: 2px solid rgba(255,235,59,0.12); }
</style>
</head>
<body>
  <div class="urgency-banner">
    <span class="timer-icon">⏰</span>
    <span>SON 24 SAAT!</span>
  </div>
  <div class="headline">{{headline}}</div>
  <div class="description">{{description}}</div>
  <div class="cta">{{cta}}</div>
  <div class="corner-bl"></div>
</body>
</html>
